<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Shop — Billeteras para Mujer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #080808;
            --dark: #111111;
            --card: #141414;
            --border: #1f1f1f;
            --border-light: #2a2a2a;
            --text: #ffffff;
            --muted: #888888;
            --subtle: #444444;
            --accent: #c9a96e;
            --wa: #25D366;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Inter', sans-serif;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--sans); background: var(--black); color: var(--text); -webkit-font-smoothing: antialiased; }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8,8,8,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-left { display: flex; align-items: center; gap: 24px; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--subtle);
            text-decoration: none;
            font-size: 0.7em;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        .back-btn:hover { color: var(--text); }
        .back-btn svg { transition: transform 0.2s; }
        .back-btn:hover svg { transform: translateX(-3px); }

        .nav-divider { width: 1px; height: 18px; background: var(--border-light); }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .nav-logo img { width: 28px; height: 28px; object-fit: contain; border-radius: 4px; }
        .nav-logo-text { font-family: var(--serif); font-size: 1.05em; font-style: italic; color: var(--text); }

        .nav-wa {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border: 1px solid var(--border-light);
            border-radius: 50px;
            font-size: 0.68em;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: all 0.3s var(--ease);
        }
        .nav-wa:hover { border-color: var(--wa); color: var(--wa); }

        .page-header {
            padding: 56px 32px 48px;
            border-bottom: 1px solid var(--border);
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-eyebrow {
            font-size: 0.65em;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
        }

        .page-title {
            font-family: var(--serif);
            font-size: clamp(2.4em, 5vw, 3.8em);
            font-weight: 300;
            font-style: italic;
            line-height: 1.05;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 60px 32px 100px; }

        .brand-section { margin-bottom: 80px; }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
        }

        .brand-title {
            font-family: var(--serif);
            font-size: 1.8em;
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .brand-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .brand-count {
            font-size: 0.65em;
            letter-spacing: 2px;
            color: var(--subtle);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2px;
        }

        .product-card {
            background: var(--card);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border-radius: 0;
        }

        .product-card:first-child { border-radius: 10px 0 0 10px; }
        .product-card:last-child { border-radius: 0 10px 10px 0; }

        .product-card:only-child { border-radius: 10px; }

        .img-wrap {
            position: relative;
            overflow: hidden;
            background: var(--card);
        }

        .product-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.6s var(--ease);
        }

        .product-card:hover .product-image {
            transform: scale(1.04);
        }

        .img-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            transition: background 0.3s var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-card:hover .img-overlay {
            background: rgba(0,0,0,0.18);
        }

        .zoom-hint {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.25s var(--ease);
        }

        .product-card:hover .zoom-hint {
            opacity: 1;
            transform: scale(1);
        }

        .product-info {
            padding: 14px 16px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        .info-left { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

        .price {
            font-family: var(--serif);
            font-size: 1.2em;
            font-weight: 400;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .codigo {
            font-size: 0.6em;
            color: var(--subtle);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .wa-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 14px;
            border: 1px solid var(--border-light);
            border-radius: 3px;
            font-size: 0.62em;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.25s var(--ease);
        }

        .wa-btn:hover {
            border-color: var(--wa);
            color: var(--wa);
            background: rgba(37,211,102,0.05);
        }

        .wa-btn svg { flex-shrink: 0; transition: fill 0.25s var(--ease); }
        .wa-btn:hover svg { fill: var(--wa); }

        .loading { text-align: center; padding: 100px 20px; color: var(--subtle); font-size: 0.85em; letter-spacing: 2px; text-transform: uppercase; }

        footer {
            background: var(--dark);
            border-top: 1px solid var(--border);
            padding: 60px 32px 32px;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .footer-brand-sm {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-brand-sm img { width: 32px; border-radius: 4px; }
        .footer-brand-sm span { font-family: var(--serif); font-style: italic; font-size: 1.1em; }

        .footer-wa-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--wa);
            text-decoration: none;
            font-size: 0.82em;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .footer-wa-link:hover { opacity: 0.8; }

        .footer-copy {
            max-width: 1200px;
            margin: 24px auto 0;
            font-size: 0.7em;
            color: var(--subtle);
            text-align: center;
            letter-spacing: 1px;
        }

        .fade-in { opacity: 0; transform: translateY(16px); transition: opacity 0.6s var(--ease), transform 0.6s var(--ease); }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            nav { padding: 0 16px; }
            .nav-wa span { display: none; }
            .page-header { padding: 40px 20px 32px; }
            .container { padding: 40px 16px 80px; }
            .brand-title { font-size: 1.4em; }
        }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 2px; }
            .product-card:first-child { border-radius: 10px 0 0 0; }
            .product-card:last-child { border-radius: 0 0 10px 0; }
            .wa-btn { padding: 8px 10px; font-size: 0.58em; }
            footer { padding: 40px 16px 24px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a class="back-btn" href="index.html">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
                </svg>
                Volver
            </a>
            <div class="nav-divider"></div>
            <a class="nav-logo" href="index.html">
                <img src="logo.jpeg" alt="Easy Shop">
                <span class="nav-logo-text">Easy Shop</span>
            </a>
        </div>
        <a class="nav-wa" href="https://wa.me/50368211667" target="_blank">
            <svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24">
                <path d="M20.52 3.48A11.84 11.84 0 0 0 12.07 0C5.5 0 .15 5.34.15 11.92c0 2.1.55 4.16 1.6 5.97L0 24l6.28-1.64a11.89 11.89 0 0 0 5.79 1.48h.01c6.57 0 11.92-5.35 11.92-11.92 0-3.18-1.24-6.16-3.48-8.44z"/>
            </svg>
            <span>Consultar</span>
        </a>
    </nav>

    <div class="page-header fade-in">
        <p class="page-eyebrow">Easy Shop — Colección</p>
        <h1 class="page-title">Billeteras para Mujer</h1>
    </div>

    <div class="container">
        <div id="catalog" class="loading">Cargando colección...</div>
    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-brand-sm">
                <img src="logo.jpeg" alt="Easy Shop">
                <span>Easy Shop</span>
            </div>
            <a class="footer-wa-link" href="https://wa.me/50368211667" target="_blank">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20.52 3.48A11.84 11.84 0 0 0 12.07 0C5.5 0 .15 5.34.15 11.92c0 2.1.55 4.16 1.6 5.97L0 24l6.28-1.64a11.89 11.89 0 0 0 5.79 1.48h.01c6.57 0 11.92-5.35 11.92-11.92 0-3.18-1.24-6.16-3.48-8.44z"/>
                </svg>
                +503 6821 1667
            </a>
        </div>
        <p class="footer-copy">© 2024 Easy Shop. Todos los derechos reservados.</p>
    </footer>

    <script>
        const CATEGORIA_ID = 'billeteras-mujer';
        const TIPO = 'billetera';
        const WA_SVG = '<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><path d="M20.52 3.48A11.84 11.84 0 0 0 12.07 0C5.5 0 .15 5.34.15 11.92c0 2.1.55 4.16 1.6 5.97L0 24l6.28-1.64a11.89 11.89 0 0 0 5.79 1.48h.01c6.57 0 11.92-5.35 11.92-11.92 0-3.18-1.24-6.16-3.48-8.44zM12.08 21.8a9.86 9.86 0 0 1-5.03-1.38l-.36-.21-3.73.98 1-3.64-.23-.37a9.83 9.83 0 1 1 8.35 4.62zm5.41-7.37c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.95 1.17-.17.2-.35.22-.65.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.48-1.75-1.65-2.05-.17-.3-.02-.47.13-.62.13-.13.3-.35.45-.52.15-.18.2-.3.3-.5.1-.2.05-.37-.03-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.08-.8.38-.27.3-1.05 1.03-1.05 2.5s1.08 2.9 1.23 3.1c.15.2 2.12 3.23 5.13 4.53.72.31 1.28.49 1.72.62.72.23 1.37.2 1.88.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.18-1.42-.08-.13-.28-.2-.58-.35z"/></svg>';

        async function cargar() {
            try {
                const res = await fetch('productos.json?v=' + Date.now());
                if (!res.ok) throw new Error();
                const data = await res.json();
                const categoria = data.categorias.find(c => c.id === CATEGORIA_ID);
                if (!categoria) throw new Error();
                renderizar(categoria, data.whatsapp);
            } catch(e) { console.error('Error:', e);
                document.getElementById('catalog').innerHTML = '<p style="color:var(--subtle);text-align:center;padding:60px;letter-spacing:2px;font-size:0.8em;text-transform:uppercase">Error al cargar la colección.</p>';
            }
        }

        function renderizar(categoria, whatsapp) {
            const catalogDiv = document.getElementById('catalog');
            const productos = categoria.productos;
            if (!productos || !productos.length) {
                catalogDiv.innerHTML = '<p style="color:var(--subtle);text-align:center">No hay productos disponibles.</p>';
                return;
            }

            const porMarca = {};
            productos.forEach(p => {
                if (!porMarca[p.marca]) porMarca[p.marca] = [];
                porMarca[p.marca].push(p);
            });

            catalogDiv.innerHTML = '';
            Object.keys(porMarca).forEach(marca => {
                const items = porMarca[marca];
                const seccion = document.createElement('div');
                seccion.className = 'brand-section fade-in';

                const header = document.createElement('div');
                header.className = 'brand-header';
                header.innerHTML = '<h2 class="brand-title">' + marca + '</h2><div class="brand-line"></div><span class="brand-count">' + items.length + ' ' + (items.length === 1 ? 'pieza' : 'piezas') + '</span>';

                const grid = document.createElement('div');
                grid.className = 'grid';
                items.forEach(producto => grid.appendChild(crearTarjeta(producto, categoria, whatsapp)));

                seccion.appendChild(header);
                seccion.appendChild(grid);
                catalogDiv.appendChild(seccion);
            });

            // Observe fade-ins
            const obs = new IntersectionObserver((entries) => {
                entries.forEach((e, i) => {
                    if (e.isIntersecting) {
                        setTimeout(() => e.target.classList.add('visible'), i * 60);
                        obs.unobserve(e.target);
                    }
                });
            }, { threshold: 0.08 });
            document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
        }

        function crearTarjeta(producto, categoria, whatsapp) {
            const card = document.createElement('div');
            card.className = 'product-card';

            const imgWrap = document.createElement('div');
            imgWrap.className = 'img-wrap';

            const img = document.createElement('img');
            img.className = 'product-image';
            img.src = producto.imagen;
            img.alt = producto.marca;
            img.loading = 'lazy';

            const overlay = document.createElement('div');
            overlay.className = 'img-overlay';
            overlay.innerHTML = '<div class="zoom-hint"><svg width="14" height="14" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607zM10.5 7.5v6m3-3h-6"/></svg></div>';

            imgWrap.addEventListener('click', () => window.open(producto.imagen, '_blank'));
            imgWrap.appendChild(img);
            imgWrap.appendChild(overlay);

            const info = document.createElement('div');
            info.className = 'product-info';

            const left = document.createElement('div');
            left.className = 'info-left';

            const precio = document.createElement('div');
            precio.className = 'price';
            precio.textContent = producto.precio || categoria.precio || '';

            const codigo = document.createElement('div');
            codigo.className = 'codigo';
            codigo.textContent = producto.codigo || '';

            left.appendChild(precio);
            left.appendChild(codigo);

            const numero = whatsapp.replace(/\D/g, '');
            const precioTexto = producto.precio || categoria.precio || '';
            const imageUrl = 'https://glassessv.github.io/' + producto.imagen; const msg = encodeURIComponent('Hola, me interesa este producto 👇
' + imageUrl + '
Código: *' + producto.codigo + '* — Precio: ' + precioTexto);

            const btn = document.createElement('a');
            btn.className = 'wa-btn';
            btn.href = 'https://wa.me/' + numero + '?text=' + msg;
            btn.target = '_blank';
            btn.innerHTML = WA_SVG + '<span>Consultar</span>';

            info.appendChild(left);
            info.appendChild(btn);
            card.appendChild(imgWrap);
            card.appendChild(info);
            return card;
        }

        // Initial fade-in for page header
        const obs0 = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs0.unobserve(e.target); }});
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => obs0.observe(el));

        cargar();
    </script>
</body>
</html>
