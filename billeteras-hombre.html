<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Shop - Billeteras para Hombre</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; }
        header { background: #000; padding: 30px 20px 25px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #555; text-decoration: none; font-size: 0.72em; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 18px; transition: color 0.2s; }
        .back-btn:hover { color: #fff; }
        header img { max-width: 70px; margin-bottom: 12px; height: auto; }
        header h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 2em; font-weight: 400; letter-spacing: 3px; font-style: italic; margin-bottom: 6px; }
        header p { font-size: 0.72em; opacity: 0.4; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
        .container { max-width: 1400px; margin: 50px auto; padding: 0 20px; }
        .brand-section { margin-bottom: 70px; }
        .brand-title { font-family: 'Playfair Display', Georgia, serif; font-size: 1.6em; color: #fff; margin-bottom: 30px; padding-bottom: 14px; border-bottom: 1px solid #222; font-weight: 400; letter-spacing: 2px; font-style: italic; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #1e1e1e; transition: transform 0.3s ease, border-color 0.3s ease; }
        .product-card:hover { transform: translateY(-6px); border-color: #333; }
        .product-image { width: 100%; height: auto; object-fit: contain; background-color: #111; display: block; cursor: pointer; transition: transform 0.3s ease; }
        .product-image:hover { transform: scale(1.03); }
        .product-info { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .left-col { display: flex; flex-direction: column; gap: 3px; }
        .price { font-size: 1em; font-weight: 400; color: #ccc; }
        .codigo { font-size: 10px; color: #555; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
        .wa-btn { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; min-width: 36px; background: transparent; border-radius: 50%; border: 1px solid #333; transition: border-color 0.3s ease; cursor: pointer; text-decoration: none; flex-shrink: 0; }
        .wa-btn:hover { border-color: #25D366; }
        .wa-btn:hover svg { fill: #25D366; }
        .wa-btn svg { transition: fill 0.3s ease; }
        .loading { text-align: center; padding: 80px 20px; color: #444; }
        footer { background-color: #000; color: white; text-align: center; padding: 40px 20px; margin-top: 80px; font-size: 0.85em; border-top: 1px solid #1a1a1a; }
        footer a { color: #25D366; text-decoration: none; font-weight: 600; }
        footer p + p { margin-top: 12px; opacity: 0.4; font-size: 0.85em; }
        @media (max-width: 480px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } header h1 { font-size: 1.5em; } .container { margin: 30px auto; } }
    </style>
</head>
<body>
    <header>
        <a class="back-btn" href="index.html">← Volver al inicio</a><br>
        <img src="logo.jpeg" alt="Easy Shop">
        <h1>Billeteras para Hombre</h1>
        <p>Easy Shop</p>
    </header>
    <div class="container">
        <div id="catalog" class="loading">Cargando...</div>
    </div>
    <footer>
        <p>📱 Contáctanos por WhatsApp: <a href="https://wa.me/50368211667">+503 6821 1667</a></p>
        <p>© 2024 Easy Shop. Todos los derechos reservados.</p>
    </footer>
    <script>
        const CATEGORIA_ID = 'billeteras-hombre';
        const TIPO = 'billeteera';

        async function cargar() {
            try {
                const res = await fetch('productos.json');
                if (!res.ok) throw new Error();
                const data = await res.json();
                const categoria = data.categorias.find(c => c.id === CATEGORIA_ID);
                if (!categoria) throw new Error();
                renderizar(categoria, data.whatsapp);
            } catch(e) {
                document.getElementById('catalog').innerHTML = '<p style="color:#666;text-align:center;padding:60px">Error al cargar productos.</p>';
            }
        }

        function renderizar(categoria, whatsapp) {
            const catalogDiv = document.getElementById('catalog');
            const productos = categoria.productos;
            if (!productos || productos.length === 0) {
                catalogDiv.innerHTML = '<p style="color:#666;text-align:center">No hay productos.</p>';
                return;
            }
            const porMarca = {};
            productos.forEach(p => {
                if (!porMarca[p.marca]) porMarca[p.marca] = [];
                porMarca[p.marca].push(p);
            });
            catalogDiv.innerHTML = '';
            Object.keys(porMarca).forEach(marca => {
                const seccion = document.createElement('div');
                seccion.className = 'brand-section';
                const tituloEl = document.createElement('h2');
                tituloEl.className = 'brand-title';
                tituloEl.textContent = marca;
                const grid = document.createElement('div');
                grid.className = 'grid';
                porMarca[marca].forEach(producto => grid.appendChild(crearTarjeta(producto, categoria, whatsapp)));
                seccion.appendChild(tituloEl);
                seccion.appendChild(grid);
                catalogDiv.appendChild(seccion);
            });
        }

        function crearTarjeta(producto, categoria, whatsapp) {
            const card = document.createElement('div');
            card.className = 'product-card';
            const img = document.createElement('img');
            img.className = 'product-image';
            img.src = producto.imagen;
            img.alt = producto.marca;
            img.loading = 'lazy';
            img.addEventListener('click', () => window.open(producto.imagen, '_blank'));
            const info = document.createElement('div');
            info.className = 'product-info';
            const left = document.createElement('div');
            left.className = 'left-col';
            const precio = document.createElement('div');
            precio.className = 'price';
            precio.textContent = producto.precio || categoria.precio || '';
            const codigo = document.createElement('div');
            codigo.className = 'codigo';
            codigo.textContent = producto.codigo || '';
            left.appendChild(precio);
            left.appendChild(codigo);
            const numero = whatsapp.replace(/\D/g, '');
            const precioTexto = producto.precio || categoria.precio || '';
            const msg = encodeURIComponent('Hola, me interesa el ' + TIPO + ' — Código: *' + producto.codigo + '* — Precio: ' + precioTexto);
            const btn = document.createElement('a');
            btn.className = 'wa-btn';
            btn.href = 'https://wa.me/' + numero + '?text=' + msg;
            btn.target = '_blank';
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="white" viewBox="0 0 24 24"><path d="M20.52 3.48A11.84 11.84 0 0 0 12.07 0C5.5 0 .15 5.34.15 11.92c0 2.1.55 4.16 1.6 5.97L0 24l6.28-1.64a11.89 11.89 0 0 0 5.79 1.48h.01c6.57 0 11.92-5.35 11.92-11.92 0-3.18-1.24-6.16-3.48-8.44zM12.08 21.8a9.86 9.86 0 0 1-5.03-1.38l-.36-.21-3.73.98 1-3.64-.23-.37a9.83 9.83 0 1 1 8.35 4.62zm5.41-7.37c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.95 1.17-.17.2-.35.22-.65.07-.3-.15-1.25-.46-2.38-1.47-.88-.78-1.48-1.75-1.65-2.05-.17-.3-.02-.47.13-.62.13-.13.3-.35.45-.52.15-.18.2-.3.3-.5.1-.2.05-.37-.03-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.08-.8.38-.27.3-1.05 1.03-1.05 2.5s1.08 2.9 1.23 3.1c.15.2 2.12 3.23 5.13 4.53.72.31 1.28.49 1.72.62.72.23 1.37.2 1.88.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.18-1.42-.08-.13-.28-.2-.58-.35z"/></svg>';
            info.appendChild(left);
            info.appendChild(btn);
            card.appendChild(img);
            card.appendChild(info);
            return card;
        }

        cargar();
    </script>
</body>
</html>
